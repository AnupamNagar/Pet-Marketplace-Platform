# ─── Production Profile ───────────────────────────────────────────────────────
# This file is active when spring.profiles.active=prod
# All secrets come from environment variables set in Render dashboard.

# ─── Database (Render PostgreSQL) ─────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Render provides Hostname, Database, Username, and Password individually 
# in the Connections dashboard. They must be set as separate env vars.

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# ─── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

# ─── Kafka (Upstash) ──────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";

spring.kafka.consumer.group-id=pet-marketplace-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.petmarketplace.backend.payload.event.OrderEvent

# ─── File Uploads ─────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ─── CORS (allow Vercel frontend) ─────────────────────────────────────────────
# CORS is configured in WebSecurityConfig using the ALLOWED_ORIGINS env var.
# Set ALLOWED_ORIGINS=https://petverse.vercel.app in Render dashboard.

# ─── Suppress warnings ────────────────────────────────────────────────────────
spring.jpa.open-in-view=false
