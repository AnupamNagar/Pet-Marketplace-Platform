spring.application.name=backend

# Server Configuration
server.port=${PORT:8080}

# ─── PostgreSQL Configuration ─────────────────────────────────────────────────
# Local: uses explicit values. Production: DATABASE_URL env var set on Render.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://127.0.0.1:5433/pet_marketplace}
spring.datasource.username=${DB_USERNAME:petuser}
spring.datasource.password=${DB_PASSWORD:petpassword}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ─── Kafka Configuration (Local Docker) ───────────────────────────────────────
# In production (Render), the prod profile overrides these with Upstash SASL settings.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
spring.kafka.consumer.group-id=pet-marketplace-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.petmarketplace.backend.payload.event.OrderEvent

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
jwt.expirationMs=${JWT_EXPIRATION_MS:86400000}

# ─── File Upload ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# ─── Razorpay ─────────────────────────────────────────────────────────────────
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_SSGS4VqThdI06K}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:yTmifh7CwWcB3wY1eNmS8J25}
